<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3A1E"/>
      <stop offset="100%" stop-color="#0D2210"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Creeper face base -->
  <rect x="4" y="4" width="24" height="24" rx="3" fill="#4CAF50"/>
  <!-- Pixel shadow (right + bottom) for depth -->
  <rect x="6" y="26" width="22" height="2" rx="1" fill="#388E3C" opacity="0.6"/>
  <rect x="26" y="6" width="2" height="20" rx="1" fill="#388E3C" opacity="0.4"/>
  <!-- Eyes (dark green pixel squares) -->
  <rect x="8" y="10" width="6" height="6" rx="1" fill="#1B3A1E"/>
  <rect x="18" y="10" width="6" height="6" rx="1" fill="#1B3A1E"/>
  <!-- Nose -->
  <rect x="13" y="16" width="6" height="3" rx="0.5" fill="#388E3C"/>
  <!-- Mouth - Creeper pattern -->
  <rect x="10" y="19" width="4" height="3" rx="0.5" fill="#1B3A1E"/>
  <rect x="18" y="19" width="4" height="3" rx="0.5" fill="#1B3A1E"/>
  <rect x="13" y="22" width="6" height="2" rx="0.5" fill="#1B3A1E"/>
  <!-- Shield overlay (VPN) - small bottom right -->
  <rect x="20" y="20" width="10" height="10" rx="3" fill="#1B3A1E" opacity="0.85"/>
  <path d="M25 22.5 L22.5 23.5 L22.5 26.5 Q25 28 27.5 26.5 L27.5 23.5 Z" fill="#00E676" filter="url(#glow)"/>
  <circle cx="25" cy="24.5" r="0.8" fill="#1B3A1E"/>
  <rect x="24.5" y="25" width="1" height="1.2" rx="0.2" fill="#1B3A1E"/>
</svg>
